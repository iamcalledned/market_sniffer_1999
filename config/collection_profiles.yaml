profiles:
  core:
    description: "Default bootstrap: FRED macro, daily market bars, corporate actions, and Yahoo validation sample."
    includes: ["fred_macro", "daily_market", "validation"]
    runs_by_default: true
  daily_market:
    description: "Daily OHLCV bars and available corporate actions for registered active instruments."
    source: massive
    canonical_source_precedence: ["massive", "yahoo"]
    price_basis: split_adjusted
    yahoo_fallback_allowed: false
    frequency: daily
    retention: indefinite
    batch_size: 10
  fred_macro:
    description: "Canonical macro and financial-condition observations from FRED."
    source: fred
    frequency: source_defined
    retention: indefinite
    batch_size: 12
  validation:
    description: "Controlled Yahoo validation sample; does not promote Yahoo to canonical."
    source: yahoo
    frequency: on_demand
    retention: "90 days unless linked to discrepancy or quality event"
    retention_class: validation
    retention_days: 90
    enabled_by_default: false
    sample_symbols: ["SPY", "QQQ", "TLT", "NVDA"]
  future_intraday_watchlist:
    description: "Prepared future one-minute/five-minute watchlist, entitlement-gated."
    source: massive
    frequency: intraday
    retention: "planned rolling 90 days"
    retention_class: intraday
    retention_days: 90
    enabled_by_default: false
    intervals: ["1m", "5m"]
  future_realtime_quote_watchlist:
    description: "Prepared future quote snapshot refresh list; no recurring polling in v1."
    source: yahoo
    frequency: on_demand
    retention: "snapshot retention policy to be decided before activation"
    retention_class: quote
    retention_days: 90
    enabled_by_default: false
validation:
  daily_bars:
    historical_validation_enabled_env: YAHOO_HISTORICAL_VALIDATION_ENABLED
    sample_symbols: ["SPY", "QQQ", "TLT", "NVDA"]
    comparison_rule_version: "daily_bar_validation_v3"
    source_price_basis:
      massive: split_adjusted
      yahoo: provider_adjusted_unknown
    sources:
      massive:
        source_field: "provider_adjusted_aggregate"
        declared_basis: split_adjusted
        basis_confidence: "provider_request_defined"
        request:
          adjusted: true
      yahoo:
        source_field: "Close"
        declared_basis: provider_adjusted_unknown
        basis_confidence: "provider_native_unverified"
        adjusted_close_field: "Adj Close"
        request:
          auto_adjust: false
          actions: true
    allowed_price_basis_pairs:
      - ["split_adjusted", "split_adjusted"]
      - ["raw", "raw"]
    approved_comparison_pairs:
      - primary: massive
        validation: yahoo
        field: close
        primary_basis: split_adjusted
        validation_basis: provider_adjusted_unknown
        comparison_basis: observed_compatible_provider_close
        status: approved_for_current_validation
        reason: "Observed SPY/QQQ compatibility under v2; revalidate after major provider/library changes or corporate-action events."
      - primary: massive
        validation: yahoo
        field: volume
        primary_basis: split_adjusted
        validation_basis: provider_adjusted_unknown
        comparison_basis: observed_compatible_volume
        status: approved_for_current_validation
        reason: "Observed SPY/QQQ compatibility under v2; revalidate after major provider/library changes or corporate-action events."
    close:
      match_percent: 0.000001
      minor_difference_percent: 0.002
      material_difference_percent: 0.01
    volume:
      match_percent: 0.0
      minor_difference_percent: 0.02
      material_difference_percent: 0.10
