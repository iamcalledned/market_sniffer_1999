profiles:
  core:
    enabled: true
    description: "Initial derived metric set for daily market evidence."

baskets:
  breadth_core:
    min_valid_ratio: 0.8
    symbols: [SPY, QQQ, IWM, DIA, VTI, ACWI, EFA, EEM, XLK, XLF, XLE, XLV, XLI, XLY, XLP, XLU, XLB, XLRE, XLC, IWD, IWF, MTUM, QUAL, USMV, VLUE, SIZE]
  ai_infrastructure:
    min_valid_count: 10
    symbols: [NVDA, AMD, AVGO, MU, MRVL, ARM, TSM, ASML, AMAT, LRCX, KLAC, VRT, ETN, PWR, CEG, VST, EQIX, DLR, ANET, CRDO]

metrics:
  market.spy_close:
    display_name: "SPY close"
    enabled: true
    category: market_structure
    formula: close
    formula_version: metric_v1
    frequency: market_daily
    unit: price
    inputs: {symbols: [SPY]}
  market.spy_return_5d:
    display_name: "SPY 5-day return"
    enabled: true
    category: market_structure
    formula: return
    formula_version: metric_v1
    frequency: market_daily
    unit: ratio
    lookback: 5
    inputs: {symbols: [SPY]}
  market.spy_return_21d:
    display_name: "SPY 21-day return"
    enabled: true
    category: market_structure
    formula: return
    formula_version: metric_v1
    frequency: market_daily
    unit: ratio
    lookback: 21
    inputs: {symbols: [SPY]}
  market.spy_return_63d:
    display_name: "SPY 63-day return"
    enabled: true
    category: market_structure
    formula: return
    formula_version: metric_v1
    frequency: market_daily
    unit: ratio
    lookback: 63
    inputs: {symbols: [SPY]}
  market.spy_ma_20d:
    display_name: "SPY 20-day moving average"
    enabled: true
    category: market_structure
