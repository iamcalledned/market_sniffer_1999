<header>
  <div>
    <h1>Market Sniffer 2000</h1>
    <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">
      Data: 
      <span class="header-status-badge {% if vm.header.data_status.lower() == 'succeeded' %}status-current{% elif vm.header.data_status.lower() == 'running' %}status-attention{% else %}status-stale{% endif %}">
        {{ vm.header.data_status }}
      </span>
      · Metrics: 
      <span class="header-status-badge {% if vm.header.metrics_status.lower() == 'succeeded' %}status-current{% elif vm.header.metrics_status.lower() == 'running' %}status-attention{% else %}status-stale{% endif %}">
        {{ vm.header.metrics_status }}
      </span>
    </div>
  </div>
  <div class="header-meta">
    <div>Evidence through {{ vm.header.evidence_date }}</div>
    <div>Generated {{ vm.header.generated_time }}</div>
    <div style="margin-top: 4px; font-weight: 600; color: {% if vm.header.quality_count > 0 %}var(--color-yellow){% else %}var(--text-muted){% endif %}">
      Quality Issues: {{ vm.header.quality_count }}
    </div>
  </div>
</header>
