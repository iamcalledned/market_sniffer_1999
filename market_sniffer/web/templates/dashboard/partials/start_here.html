<section class="brief-card start-card" id="start-here-section">
  <div class="section-heading">
    <span class="section-kicker">Orientation</span>
    <h2>Start Here</h2>
  </div>
  <p class="market-brief-text">
    {{ vm.start_here.intro_text }}
  </p>
  <ul class="check-list">
    {% for point in vm.start_here.bullet_points %}
      <li>{{ point }}</li>
    {% endfor %}
  </ul>
</section>
