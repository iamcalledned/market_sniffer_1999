<section class="what-changed-card">
  <div class="section-heading compact">
    <span class="section-kicker">Evidence</span>
    <h2>What Changed (Curated Evidence)</h2>
  </div>
  {% if vm.what_changed %}
    <div class="evidence-list">
      {% for item in vm.what_changed %}
        <article class="evidence-item {% if item.severity != 'info' %}{{ item.severity }}{% endif %}">
          <div class="evidence-headline">{{ item.headline }}</div>
          <div class="evidence-detail">{{ item.detail }}</div>
        </article>
      {% endfor %}
    </div>
  {% else %}
    <p class="empty-state">No evidence events captured in the last 14 days.</p>
  {% endif %}
</section>
