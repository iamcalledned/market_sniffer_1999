<section class="market-map-grid">
  {% for panel in vm.market_map %}
    <article class="market-panel">
      <div class="market-panel-header">
        <div>
          <span class="section-kicker">Market map</span>
          <h3>{{ panel.title }}</h3>
        </div>
        {% if panel.chart_link %}
          <a href="{{ panel.chart_link }}" class="btn btn-secondary">View Key Chart</a>
        {% endif %}
      </div>
      <div class="market-panel-summary">{{ panel.summary }}</div>
      
      <div class="table-scroll">
        <table class="metric-table">
          <thead>
            <tr>
              <th>Metric</th>
              <th>Code</th>
              <th class="numeric">Value</th>
              <th class="numeric">Chart</th>
            </tr>
          </thead>
          <tbody>
            {% for metric in panel.metrics %}
              <tr>
                <td class="metric-name-cell">{{ metric.display_name }}</td>
                <td class="metric-code-cell">{{ metric.metric_code }}</td>
                <td class="metric-value-cell">{{ metric.value }}</td>
                <td class="metric-action-cell">
                  <a href="{{ metric.chart_link }}" class="icon-link" aria-label="Open chart for {{ metric.display_name }}">Chart</a>
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </article>
  {% endfor %}
</section>
