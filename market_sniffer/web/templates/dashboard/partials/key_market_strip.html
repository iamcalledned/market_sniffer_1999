<section class="kpi-strip">
  {% for tile in vm.key_market_strip %}
    <article class="kpi-tile {% if tile.status != 'normal' %}{{ tile.status }}{% endif %}">
      <div class="kpi-topline">
        <span class="kpi-label">{{ tile.label }}</span>
        <span class="kpi-dot" aria-hidden="true"></span>
      </div>
      <strong class="kpi-value">{{ tile.value }}</strong>
      <span class="kpi-detail">{{ tile.detail }}</span>
    </article>
  {% endfor %}
</section>
